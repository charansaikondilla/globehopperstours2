
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale-1.0" />
    <title>3D Rotating Earth</title>
    
    <!-- GitHub Pages SPA Redirect Script -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://d3js.org/topojson.v3.min.js"></script>
    <style>
      @keyframes twinkle {
        0%, 100% { opacity: 0.3; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.1); }
      }
      .animate-twinkle {
        animation: twinkle linear infinite;
      }
      body {
        background-color: #000;
        color: #fff;
        overflow: hidden;
      }
      #tooltip {
        position: absolute;
        display: none;
        background: rgba(0, 0, 0, 0.7);
        border-radius: 4px;
        padding: 6px 10px;
        color: white;
        font-family: sans-serif;
        font-size: 14px;
        pointer-events: none; /* so it doesn't block mouse events on the globe */
        z-index: 100;
      }
      .pin {
        fill: #ff4136; /* A bright red color */
        stroke: #fff;
        stroke-width: 0.5px;
        cursor: pointer;
        transition: r 0.2s ease-in-out, fill 0.2s ease-in-out;
      }
      .pin:hover {
        fill: #ff851b; /* A lighter orange on hover */
        r: 6px !important; /* Enlarge the pin on hover */
      }
      .popup-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
      .popup-content {
        background-color: #2d3748; /* gray-800 */
        padding: 2rem;
        border-radius: 0.5rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        position: relative;
        max-width: 90vw;
        width: 500px;
        color: #fff;
      }
      .popup-close {
        position: absolute;
        top: 0.5rem;
        right: 0.75rem;
        font-size: 1.5rem;
        font-weight: bold;
        color: #a0aec0; /* gray-500 */
        cursor: pointer;
        line-height: 1;
      }
      .popup-close:hover {
        color: #fff;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="tooltip"></div>
    <div id="root"></div>

</body>
</html>
